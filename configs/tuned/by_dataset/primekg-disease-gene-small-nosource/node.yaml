anchor_stabilization:
  lambda1: 2.0
  lambda2: 0.05

inpainting:
  mode: full
  cc_drop_threshold: 0.3
  min_damage_ratio: 0.1
  edge_threshold: 0.5
  max_added_edges: 256
  repair_ratio: 0.2

dar:
  enabled: true
  lambda2: 0.05

unlearning:
  type: node
  edge_forget_loss_mode: original_kl
  forget_weight: 0.2
  finetune_epochs: 80
  finetune_lr: 0.01

