anchor_stabilization:
  lambda1: 1.0
  lambda2: 0.05

inpainting:
  cc_drop_threshold: 0.3
  min_damage_ratio: 0.1
  edge_threshold: 0.5
  max_added_edges: 256
  repair_ratio: 0.25

unlearning:
  edge_forget_loss_mode: uniform
  forget_weight: 0.3
  finetune_epochs: 80
  finetune_lr: 0.005

