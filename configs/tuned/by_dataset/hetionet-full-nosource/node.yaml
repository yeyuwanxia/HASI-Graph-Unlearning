# Hetionet-Full-NoSource node transferred tuned HASI config.
# Origin: results/tuning/hetionet-small-nosource/node_round2_privacy_wide/configs/config_0007.json
# Selection: cfg0007 was tuned on Hetionet-Small-NoSource and then evaluated
# unchanged on Hetionet-Full-NoSource; no full-dataset retuning was performed.
model:
  type: GCN
  hidden_channels: 64
  num_layers: 2
  dropout: 0.5

training:
  seed: 42
  epochs: 300
  lr: 0.01
  weight_decay: 5.0e-4
  split: stratified_random
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2

hub_identification:
  alpha: 0.4
  beta: 0.3
  gamma: 0.3
  filter_ratio: 0.1
  primary_ratio: 0.01
  secondary_ratio: 0.05

anchor_stabilization:
  lambda1: 0.0
  lambda2: 0.02

erf_partitioning:
  alpha: 0.15
  k_steps: 3
  threshold: 0.01

inpainting:
  mode: full
  method: mgae
  cc_drop_threshold: 0.3
  min_damage_ratio: 0.1
  hidden_channels: 64
  embedding_channels: 32
  train_epochs: 80
  lr: 0.01
  mask_ratio: 0.15
  edge_threshold: 0.5
  max_added_edges: 256
  repair_ratio: 0.05
  max_candidate_nodes: 512
  max_candidate_edges: 20000

dar:
  enabled: true
  k: 5
  strategy: distributed
  min_distance: 2
  small_component_threshold: 10
  gumbel_tau: 0.1
  alpha_score: 0.6
  beta_score: 0.4
  max_search_radius: null

unlearning:
  type: node
  ratio: 0.1
  forget_weight: 0.8
  edge_forget_loss_mode: uniform
  finetune_epochs: 120
  finetune_lr: 0.003

optimization:
  affected_anchor_scope: erf
  subgraph_finetune: true
  subgraph_min_nodes: 5000
  lazy_train_inpainter: true

feature_unlearning:
  drift_threshold: 1.0e-6
  anchor_to_h_new: true

evaluation:
  mia_levels: [weak, medium, strong]
  run_structural_metrics: true
